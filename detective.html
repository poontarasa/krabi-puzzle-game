<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นักสืบประติมากรรมกระบี่</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        header {
            background: linear-gradient(135deg, #0288d1, #0056b3);
            color: white;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }

        .game-container {
            position: relative;
            width: 95%;
            max-width: 600px;
            margin: 20px 0;
            background-color: #e0f2fe;
            border: 4px solid #0288d1;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        /* ฉากหลังที่ทำให้ดูลายตาขึ้นเพื่อซ่อนของ */
        .game-scene {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #7dd3fc 0%, #38bdf8 40%, #0288d1 70%, #0c4a6e 100%);
            position: relative;
        }

        /* สิ่งแวดล้อมที่เอาไว้บัง/ซ่อนไอเทม */
        .scenery-cloud1 { position: absolute; background: white; border-radius: 20px; width: 120px; height: 40px; top: 15%; left: 10%; opacity: 0.9; }
        .scenery-cloud2 { position: absolute; background: white; border-radius: 20px; width: 100px; height: 35px; top: 25%; right: 15%; opacity: 0.7; }
        .scenery-mountain1 { position: absolute; bottom: 30%; left: 15%; border-left: 80px solid transparent; border-right: 80px solid transparent; border-bottom: 120px solid #1e3a8a; opacity: 0.8; }
        .scenery-mountain2 { position: absolute; bottom: 30%; right: 10%; border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 90px solid #1e40af; opacity: 0.7; }
        .scenery-sea { position: absolute; bottom: 0; width: 100%; height: 35%; background: linear-gradient(to bottom, #0369a1, #1e3a8a); }
        .scenery-bush { position: absolute; bottom: 30%; left: 5%; background-color: #065f46; width: 70px; height: 30px; border-radius: 15px; }

        /* 👁️ ซ่อนไอเทมจริง: ปรับให้ตัวเล็กจิ๋ว (14px) และโปร่งแสงเล็กน้อยให้เนียนไปกับพื้นหลัง */
        .hidden-item {
            position: absolute;
            cursor: pointer;
            font-size: 15px;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.65;
            transition: all 0.2s;
        }
        /* เวลาเอาเมาส์ชี้หรือจิ้มโดนถึงจะชัดขึ้นมา */
        .hidden-item:hover { opacity: 1; transform: scale(1.2); }

        /* จุดซ่อนเนียนๆ */
        #item-eagle { top: 18%; left: 28%; } /* นกออก แอบอยู่ในก้อนเมฆสีขาว */
        #item-ship { bottom: 12%; right: 45%; } /* เรือสำเภา แอบอยู่กลางทะเลลึก */
        #item-crab { bottom: 31%; left: 9%; } /* พยาปูดำ แอบอยู่หลังพุ่มไม้ริมฝั่ง */

        .task-bar {
            width: 95%;
            max-width: 600px;
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            box-sizing: border-box;
        }

        .task-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
        }

        .task-item span { font-size: 28px; margin-bottom: 5px; }
        .task-item.found { color: #10b981; text-decoration: line-through; opacity: 0.5; }

        /* ป๊อปอัปความรู้ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon { font-size: 60px; margin-bottom: 10px; }
        .modal-title { font-size: 22px; font-weight: bold; color: #0f172a; margin-bottom: 10px; }
        .modal-text { font-size: 15px; color: #334155; line-height: 1.6; margin-bottom: 20px; text-align: left; }
        
        .close-btn {
            background-color: #0288d1;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .victory-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            text-align: center;
            z-index: 5;
        }
        .victory-screen h2 { color: #10b981; font-size: 28px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>🕵️‍♂️ นักสืบประติมากรรมกระบี่</h1>
        <p>วัตถุชิ้นเล็กๆ แอบซ่อนอยู่ตามฉากเมืองกระบี่ ลองหาดูสิ!</p>
    </header>

    <div class="game-container">
        <div class="game-scene">
            <div class="scenery-cloud1"></div>
            <div class="scenery-cloud2"></div>
            <div class="scenery-mountain1"></div>
            <div class="scenery-mountain2"></div>
            <div class="scenery-sea"></div>
            <div class="scenery-bush"></div>

            <div class="hidden-item" id="item-eagle" onclick="findItem('eagle')">🦅</div>
            <div class="hidden-item" id="item-ship" onclick="findItem('ship')">⛵</div>
            <div class="hidden-item" id="item-crab" onclick="findItem('crab')">🦀</div>
        </div>

        <div class="victory-screen" id="victory-layout">
            <h2>🎉 คุณคือนักสืบระดับเทพ!</h2>
            <p style="color: #475569; font-size: 16px; margin-bottom: 20px;">ค้นพบเบาะแสประติมากรรมครบถ้วนและถูกต้อง</p>
            <button class="close-btn" style="width: auto;" onclick="resetGame()">เล่นใหม่อีกครั้ง</button>
        </div>
    </div>

    <div class="task-bar">
        <div class="task-item" id="task-crab"><span>🦀</span>พญาปูดำ</div>
        <div class="task-item" id="task-eagle"><span>🦅</span>นกออก</div>
        <div class="task-item" id="task-ship"><span>⛵</span>เรือสำเภา</div>
    </div>

    <div class="modal" id="fact-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">🦀</div>
            <div class="modal-title" id="modal-title">ชื่อวัตถุ</div>
            <div class="modal-text" id="modal-text">เนื้อหาความรู้...</div>
            <button class="close-btn" onclick="closeModal()">บันทึกเบาะแสลงสมุด</button>
        </div>
    </div>

    <script>
        const factData = {
            crab: {
                icon: "🦀",
                title: "ประติมากรรมพญาปูดำ",
                text: "ตั้งอยู่บริเวณท่าเรือขนาบน้ำ ประกอบด้วยตัวแม่ 1 ตัว และตัวลูก 3 ตัว สร้างขึ้นเพื่อระลึกถึงความอุดมสมบูรณ์ของป่าชายเลนและเมืองกระบี่ นอกจากนี้ยังแฝงแนวคิดเรื่องความผูกพันในครอบครัวอีกด้วยครับ!"
            },
            eagle: {
                icon: "🦅",
                title: "ประติมากรรมนกออก",
                text: "หรือ 'นกอินทรีทะเลท้องขาว' ตั้งอยู่ที่หลักกิโลเมตรที่ 0 ถือเป็นนกประจำถิ่นที่สะท้อนถึงวิสัยทัศน์ที่กว้างไกล การบินสูง และความอุดมสมบูรณ์ของระบบนิเวศชายฝั่งจังหวัดกระบี่"
            },
            ship: {
                icon: "⛵",
                title: "ประติมากรรมเรือสำเภาโบราณ",
                text: "ตั้งอยู่บริเวณหน้าเมืองกระบี่ เป็นสัญลักษณ์ที่บอกเล่าประวัติศาสตร์ในอดีต ว่าเมืองกระบี่เคยเป็นเมืองท่าสำคัญที่มีการค้าขายทางเรือกับต่างชาติมาอย่างยาวนานตั้งแต่อดีตกาล"
            }
        };

        let foundItems = { crab: false, eagle: false, ship: false };

        function findItem(itemKey) {
            if (foundItems[itemKey]) return;

            foundItems[itemKey] = true;
            document.getElementById(`task-${itemKey}`).classList.add('found');
            document.getElementById(`item-${itemKey}`).style.visibility = 'hidden';

            document.getElementById('modal-icon').innerText = factData[itemKey].icon;
            document.getElementById('modal-title').innerText = factData[itemKey].title;
            document.getElementById('modal-text').innerHTML = factData[itemKey].text;
            document.getElementById('fact-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('fact-modal').style.display = 'none';
            if (foundItems.crab && foundItems.eagle && foundItems.ship) {
                document.getElementById('victory-layout').style.display = 'flex';
            }
        }

        function resetGame() {
            foundItems = { crab: false, eagle: false, ship: false };
            document.getElementById('task-crab').classList.remove('found');
            document.getElementById('task-eagle').classList.remove('found');
            document.getElementById('task-ship').classList.remove('found');
            document.getElementById('item-crab').style.visibility = 'visible';
            document.getElementById('item-eagle').style.visibility = 'visible';
            document.getElementById('item-ship').style.visibility = 'visible';
            document.getElementById('victory-layout').style.display = 'none';
        }
    </script>
</body>
</html>
